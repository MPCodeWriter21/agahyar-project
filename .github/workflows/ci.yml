name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Run pip-audit
        run: uv run pip-audit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgis:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_DB: agahyar
          POSTGRES_USER: agahyar
          POSTGRES_PASSWORD: agahyar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL/GEOS/PROJ system libraries
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv --clear
          uv sync --all-extras
          uv pip install -e ".[dev]"

      - name: Set up database env vars
        run: |
          echo "DB_ENGINE=django.contrib.gis.db.backends.postgis" >> "$GITHUB_ENV"
          echo "DB_NAME=agahyar" >> "$GITHUB_ENV"
          echo "DB_USER=agahyar" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=agahyar_test" >> "$GITHUB_ENV"
          echo "DB_HOST=localhost" >> "$GITHUB_ENV"
          echo "DB_PORT=5432" >> "$GITHUB_ENV"

      - name: Download vendored static assets
        run: bash scripts/vendor_static.sh

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Check migration consistency
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: uv run pytest -v --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80
