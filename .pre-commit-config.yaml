repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v1.8.0
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/djlint/djlint
    rev: v1.40.3
    hooks:
      - id: djlint-reformat
        files: 'templates/.*\.html$'

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: [--config, .hadolint.yaml]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^src/
        exclude: >
          (?x)^(
            .*/migrations/
          )$

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit dependency scan
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        always_run: true

      - id: prettier
        name: Format CSS and JS
        entry: prettier --write
        language: node
        types_or: [css, javascript]
        additional_dependencies: ['prettier@3.9.4']
        exclude: >
          (?x)^(
            static/libs/|
            dist/|
            .*\.min\.(css|js)$
          )$


