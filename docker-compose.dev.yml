services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src/agahyar_project:/app/src/agahyar_project
      - ./src/services:/app/src/services
      - ./templates:/app/templates
      - ./static:/app/static
      - ./manage.py:/app/manage.py
      - ./scripts:/app/scripts
    command: uv run --no-sync python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agahyar.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.agahyar.entrypoints=websecure"
      - "traefik.http.services.agahyar.loadbalancer.server.port=8000"

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`adminer.${DOMAIN}`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: agahyar
      POSTGRES_USER: agahyar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agahyar_dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agahyar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true

volumes:
  postgres_data:
  redis_data:
