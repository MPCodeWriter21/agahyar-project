services:
  db:
    image: postgis/postgis:17-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: agahyar
      POSTGRES_USER: agahyar
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agahyar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network

  # adminer:
  #   image: adminer:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     ADMINER_DEFAULT_SERVER: db
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - traefik-network
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.adminer.rule=Host(`adminer.${DOMAIN}`)"
  #     - "traefik.http.routers.adminer.entrypoints=websecure"
  #     - "traefik.http.routers.adminer.tls=true"
  #     - "traefik.http.services.adminer.loadbalancer.server.port=8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agahyar.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.agahyar.entrypoints=websecure"
      - "traefik.http.routers.agahyar.tls=true"
      - "traefik.http.services.agahyar.loadbalancer.server.port=8000"

networks:
  traefik-network:
    external: true

volumes:
  postgres_data:
  redis_data:
