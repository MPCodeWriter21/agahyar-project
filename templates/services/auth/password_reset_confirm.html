{% extends 'services/base.html' %}

{% block title %}تنظیم رمز جدید | آگاه‌یار{% endblock %}

{% block content %}


<div class="reset-container">
 <h2> تنظیم رمز عبور جدید</h2>

 <form method="post">
 {% csrf_token %}
 <div class="form-group">
 <label>رمز عبور جدید</label>
  <input type="password" name="new_password1" placeholder="رمز جدید را وارد کنید" class="ltr-input" dir="ltr" required>
  </div>
  <div class="form-group">
  <label>تکرار رمز عبور جدید</label>
  <input type="password" name="new_password2" placeholder="رمز جدید را دوباره وارد کنید" class="ltr-input" dir="ltr" required>
 </div>
 <button type="submit" class="btn-primary"> تغییر رمز عبور</button>
 </form>
</div>
{% endblock %}
