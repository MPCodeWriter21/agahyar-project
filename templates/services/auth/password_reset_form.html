{% extends 'services/base.html' %}
{% block title %}بازیابی رمز عبور | آگاه‌یار{% endblock %}
{% block content %}
  <div class="reset-container">
    <h2>بازیابی رمز عبور</h2>
    <p class="reset-description">ایمیل خود را وارد کنید تا لینک بازیابی برای شما ارسال شود.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>آدرس ایمیل</label>
        <input type="email"
               name="email"
               placeholder="example@email.com"
               class="ltr-input"
               dir="ltr"
               autocomplete="email"
               required>
      </div>
      <button type="submit" class="btn-primary">ارسال لینک بازیابی</button>
    </form>
    <div class="register-link">
      <a href="{% url 'login' %}">بازگشت به صفحه ورود</a>
    </div>
  </div>
{% endblock %}
